	<meta charset="UTF-8">

	<link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/contact.css">
	<link rel="icon" href="../images/technical-support-favicon.png">
</head>
<body>
	<header>
        <!-- troubleshoot.io Header and Navigation-->
        <div class="navbar">
            <a href="../index.html" class="main_logo">troubleshoot.io</a>

            <div class="nav-links">
                <a href="../index.html">Home</a>

                <div class="dropdown">
                    <a href="../categories/index.html">Categories</a>
                    <div class="dropdown-menu">
                    <a href="../hardware_issues/index.html">Hardware Issues</a>
                    <a href="../network_issues/index.html">Network Issues</a>
                    <a href="../software_issues/index.html">Software Issues</a>
                    </div>

                <a href="#" class="explore" style="color: black;">Explore</a>

        </div>

    <!-- Main Header Contact Section -->
     <h1 class="main-contact-heading"> <b>Contact Us</b></h1>
     <p class="text-under-main-contact-heading">Contact us at the form below:</p>

    <!-- Form Structure -->
	<form action="submit.html" method="post">
            <div>
                <label for="first_name">First name:</label>
                <input type="text" id="first_name" name="first_name" autofocus required>
            </div>
            <div>
                <label for="last_name">Last name:</label>
                <input type="text" id="last_name" name="last_name" required>
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="text" id="email" name="email" required>
            </div>
            <div>
                <label for="zip_code">Zip Code:</label>
                <input type="text" id="zip_code" name="zip_code" placeholder="Optional but appreciated: 99999"
                pattern="\d{5}([\-]\d{4})?"
                title="Must be 99999 or 99999-9999">
            </div>
            <br> <!-- Line Break-->
            <button type="submit">Submit</button>
    </form>    

    <!-- Expand Body to Fix Formatting of Footer -->
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>

         </ul>
	</footer>
